<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="200" fill="#FF6B9D"/>

  <!-- Outer border -->
  <rect x="10" y="10" width="180" height="180" fill="none" stroke="#0F0F0F" stroke-width="8"/>

  <!-- Inner decorative border -->
  <rect x="20" y="20" width="160" height="160" fill="none" stroke="#0F0F0F" stroke-width="3" stroke-dasharray="8,8" opacity="0.3"/>

  <!-- Letter A shape -->
  <path d="M 100 50 L 70 130 L 85 130 L 90 115 L 110 115 L 115 130 L 130 130 Z"
        fill="#FFD93D" stroke="#0F0F0F" stroke-width="6" stroke-linejoin="miter"/>

  <!-- A crossbar -->
  <rect x="92" y="100" width="16" height="10" fill="#0F0F0F"/>

  <!-- Top triangle detail -->
  <path d="M 100 50 L 95 65 L 105 65 Z" fill="#0F0F0F"/>

  <!-- Arcade controller buttons -->
  <circle cx="60" cy="155" r="8" fill="#6BCDCF" stroke="#0F0F0F" stroke-width="4"/>
  <circle cx="80" cy="155" r="8" fill="#6BCF7F" stroke="#0F0F0F" stroke-width="4"/>
  <circle cx="120" cy="155" r="8" fill="#FF6B6B" stroke="#0F0F0F" stroke-width="4"/>
  <circle cx="140" cy="155" r="8" fill="#A78BFA" stroke="#0F0F0F" stroke-width="4"/>

  <!-- Corner diamonds -->
  <rect x="15" y="15" width="12" height="12" fill="#FFD93D" stroke="#0F0F0F" stroke-width="3" transform="rotate(45 21 21)"/>
  <rect x="173" y="15" width="12" height="12" fill="#6BCDCF" stroke="#0F0F0F" stroke-width="3" transform="rotate(45 179 21)"/>
  <rect x="15" y="173" width="12" height="12" fill="#6BCF7F" stroke="#0F0F0F" stroke-width="3" transform="rotate(45 21 179)"/>
  <rect x="173" y="173" width="12" height="12" fill="#A78BFA" stroke="#0F0F0F" stroke-width="3" transform="rotate(45 179 179)"/>

  <!-- Shadow effect -->
  <rect x="195" y="15" width="5" height="180" fill="#0F0F0F" opacity="0.3"/>
  <rect x="15" y="195" width="180" height="5" fill="#0F0F0F" opacity="0.3"/>
</svg>
